<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="design.css">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com" rel="preconnect">

    <link href="https://fonts.gstatic.com" crossorigin rel="preconnect">

    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600&family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap"
        rel="stylesheet">

    <link href="favicon-96x96.png" rel="icon" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


    <title>Contact Us | AM World School</title>

</head>

<body class="bg-background text-on-background font-body-md antialiased flex flex-col min-h-screen">
    <!-- TopNavBar -->
    <div id="navbar"></div>

    <!-- Hero Section
    <section class="max-w-container-max mx-auto px-margin-x mb-section-gap">
        <div class="md:w-2/3">
            <h1 class="font-headline-xl text-headline-xl text-primary mb-4">Get in Touch</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant">We are here to support your global operations
                with dedicated expertise and seamless integration. Reach out to our regional specialists for tailored
                solutions.</p> -->
    <div class="h-28"></div>

    <!-- Main Content (Two Columns) -->
    <section class="max-w-container-max mx-auto px-margin-x mb-section-gap">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
            <!-- Left Column: Contact Form -->
            <div
                class="md:col-span-7 bg-white border border-[#E5E7EB] p-8 rounded-lg shadow-[0_10px_15px_-3px_rgba(4,22,39,0.02)]">
                <form class="space-y-6" id="contact-form">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-10">
                        <div class="space-y-2">
                            <label class="block font-label-md text-label-md text-primary" for="name">NAME</label>
                            <input
                                class="w-full bg-surface-container-low border border-outline-variant p-3 rounded focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none"
                                id="name" name="name" placeholder="ABC" required="" type="text" />
                        </div>
                        <div class="space-y-2">
                            <label class="block font-label-md text-label-md text-primary" for="email">EMAIL
                                ADDRESS</label>
                            <input
                                class="w-full bg-surface-container-low border border-outline-variant p-3 rounded focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none"
                                id="email" name="email" placeholder="abc@gmail.com" required="" type="email" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label-md text-label-md text-primary" for="phone">
                            PHONE
                        </label>

                        <input
                            class="w-full bg-surface-container-low border border-outline-variant p-3 rounded focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none"
                            id="phone" name="phone" type="tel" placeholder="1234567890" maxlength="10"
                            pattern="[0-9]{10}" inputmode="numeric"
                            oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,10)" required>
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label-md text-label-md text-primary" for="message">MESSAGE</label>
                        <textarea
                            class="w-full bg-surface-container-low border border-outline-variant p-3 rounded focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none resize-none"
                            id="message" name="message" placeholder="How can we help you today?" required=""
                            rows="6"></textarea>
                    </div>
                    <button
                        class="w-full md:w-auto bg-primary text-on-primary px-10 py-4 rounded font-label-md text-[18px] hover:bg-[#061e35] transition-all flex items-center justify-center gap-2"
                        type="submit">
                        Send Inquiry
                        <span class="material-symbols-outlined text-[20px]">send</span>
                    </button>
                </form>
            </div>
            <!-- Right Column: Contact Details -->
            <div class="md:col-span-4 md:col-start-9 space-y-stack-lg">
                <!-- Office Card -->
                <div class="bg-white border border-[#E5E7EB] p-8 rounded-lg">
                    <h3 class="font-headline-md text-headline-md text-primary mb-6">Contact Details</h3>
                    <ul class="space-y-6">
                        <li class="flex gap-4">
                            <span class="material-symbols-outlined text-secondary"
                                style="font-variation-settings: 'FILL' 1;">location_on</span>
                            <div>
                                <p class="font-label-md text-label-md text-primary">ADDRESS</p>
                                <p class="font-body-md text-body-md text-on-surface-variant">
                                    AM WORLD SCHOOL, Bahjoi Road Maulagarh Chandausi, Sambhal<br />Pin code: 244412
                                </p>
                            </div>
                        </li>
                        <li class="flex gap-4">
                            <span class="material-symbols-outlined text-secondary"
                                style="font-variation-settings: 'FILL' 1;">phone_in_talk</span>
                            <div>
                                <p class="font-label-md text-label-md text-primary">PHONE</p>
                                <p class="font-body-md text-body-md text-on-surface-variant">+91 9012688800,
                                    +91 8002148800</p>
                            </div>
                        </li>
                        <li class="flex gap-4">
                            <span class="material-symbols-outlined text-secondary"
                                style="font-variation-settings: 'FILL' 1;">mail</span>
                            <div>
                                <p class="font-label-md text-label-md text-primary">EMAIL</p>
                                <p class="font-body-md text-body-md text-on-surface-variant">amworldschools@gmail.com
                                </p>
                            </div>
                        </li>
                    </ul>
                </div>
                <!-- Social Links -->
                <div class="bg-surface-container-low p-8 rounded-lg">
                    <h3 class="font-label-md text-label-md text-primary mb-4 tracking-widest">
                        CONNECT WITH US
                    </h3>

                    <div class="flex gap-4">
                        <!-- Facebook -->
                        <a href="https://www.facebook.com/amworldschool/" target="_blank"
                            class="w-10 h-10 flex items-center justify-center bg-white border border-outline-variant rounded-lg hover:border-[#1877F2] hover:text-[#1877F2] transition-all duration-300">
                            <i class="fa-brands fa-facebook-f text-lg"></i>
                        </a>

                        <!-- YouTube -->
                        <a href="https://www.youtube.com/@AMWorldSchoolChandausi" target="_blank"
                            class="w-10 h-10 flex items-center justify-center bg-white border border-outline-variant rounded-lg hover:border-[#FF0000] hover:text-[#FF0000] transition-all duration-300">
                            <i class="fa-brands fa-youtube text-lg"></i>
                        </a>

                        <!-- Instagram -->
                        <a href="https://www.instagram.com/amworldschoolofficial?igsh=YXN5cTVtcnM4czdk" target="_blank"
                            class="w-10 h-10 flex items-center justify-center bg-white border border-outline-variant rounded-lg hover:border-[#E4405F] hover:text-[#E4405F] transition-all duration-300">
                            <i class="fa-brands fa-instagram text-lg"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section class="w-full py-12 bg-surface-container flex justify-center">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d14031.151170023457!2d78.7560997!3d28.4558127!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390adbc399e05c0d%3A0xbca9fb1ec6121cb!2sA%20M%20World%20School!5e0!3m2!1sen!2sin!4v1700042081037!5m2!1sen!2sin"
            class="w-[90%] md:w-[80%] h-[300px] md:h-[450px] rounded-2xl shadow-xl" style="border:0;" allowfullscreen=""
            loading="lazy">
        </iframe>
    </section>





    <!-- Footer -->
    <div id="footer"></div>

    <script src="include.js"></script>
    <script src="javacontact_us.js"></script>
    <script src="javamobilemenu.js"></script>
</body>

</html>
