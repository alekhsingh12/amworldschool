    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Glass Navbar */
        /* Dynamic Island Navbar */

        .glass-nav {
            background: rgba(255, 255, 255, .18);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);

            border: 1px solid rgba(255, 255, 255, .22);

            border-radius: 999px;

            box-shadow:
                0 10px 35px rgba(0, 0, 0, .14),
                inset 0 1px 1px rgba(255, 255, 255, .35);

            transition: all .35s ease;

            overflow: visible;
        }

        .glass-nav:hover {
            transform: translateX(-50%) translateY(-2px);
            background: rgba(255, 255, 255, .22);
            box-shadow:
                0 18px 45px rgba(0, 0, 0, .18),
                inset 0 1px 1px rgba(255, 255, 255, .4);
        }

        /* Desktop */
        #scroll-container {
            height: 400vh;
        }

        @media (max-width:768px) {

            #scroll-container {
                height: 220vh;
            }

        }

        /* ===========================
   MOBILE RESPONSIVE
   Desktop remains unchanged
=========================== */

        @media screen and (max-width:768px) {

            /* html,
                        body {
                                overflow-x: hidden;
                        } */
            /* Mobile Scroll Animation */
            #scroll-container {
                height: 180vh !important;
            }

            #sticky-wrapper {
                height: 100vh !important;
            }

            #scroll-canvas {
                object-fit: contain !important;
            }

            /* Text positioning */
            #slide-1,
            #slide-4 {
                width: 95%;
                max-width: 95%;
                padding: 0 16px;
            }

            /* Optional: keep text lower on mobile */
            /* #slide-1,
                        #slide-4 {
                                top: 55%;
                                transform: translateY(-50%);
                        } */

            /* Navbar */

            nav .max-w-container-max {
                padding: 12px 16px;
            }

            nav img {
                height: 42px !important;
            }

            nav span.font-headline-sm {
                font-size: 18px;
            }

            /* Hide desktop menu */

            nav .md\:flex {
                display: none !important;
            }

            /* Show menu icon */

            .material-symbols-outlined.menu-mobile {
                display: block !important;
                font-size: 34px;
                cursor: pointer;
            }

            /* Hero */

            #scroll-container {
                height: 260vh !important;
            }

            #slide-1,
            #slide-4 {
                width: 90%;
                max-width: 100%;
                padding: 0 20px;
            }

            #slide-1 h1 {
                font-size: 34px !important;
                line-height: 42px !important;
            }

            #slide-4 h2 {
                font-size: 30px !important;
                line-height: 38px !important;
            }

            #slide-1 p,
            #slide-4 p {
                font-size: 18px !important;
                line-height: 30px !important;
            }

            /* Buttons */

            button {
                width: 100%;
            }

            #slide-4 .flex {
                width: 100%;
            }

            /* About */

            section.grid {
                gap: 20px;
            }

            /* Director Principal */

            .group .relative.h-\[400px\] {
                height: 280px !important;
            }

            /* Cards */

            .grid.md\:grid-cols-3 {
                grid-template-columns: 1fr !important;
            }

            .grid.md\:grid-cols-2 {
                grid-template-columns: 1fr !important;
            }

            /* CTA */

            section.bg-primary {
                text-align: center;
            }

            section.bg-primary button {
                width: 100%;
            }

            /* Footer */

            footer {
                text-align: center;
            }

            footer>div {
                width: 100%;
                max-width: 100%;
                align-items: center;
            }

            footer .md\:items-end {
                align-items: center !important;
            }

        }

        @media (max-width:768px) {

            .glass-nav {

                width: 90%;
                top: 12px;

                border-radius: 999px;

            }

            .glass-nav>div {
                padding: 12px 18px;
            }
        }

        /* Mobile menu */
        .mobile-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            font-size: 17px;
            font-weight: 600;
            transition: all .3s ease;
        }

        .mobile-link:hover {

            background: #f8f8f8;

            padding-left: 45px;

            color: #b40002;

        }

        .mobile-link.active {

            color: #b40002;

            font-weight: 700;

        }

        /* New */
        #mobileMenu {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            /* Firefox */
        }

        #mobileMenu::-webkit-scrollbar {
            display: none;
            /* Chrome, Edge, Safari */
        }

        /* ===========================
   Glass Dropdown
=========================== */

        .glass-dropdown {

            background: rgba(255, 255, 255, 1);

            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);

            border: 1px solid rgba(255, 255, 255, .25);

            border-radius: 20px;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, .18),
                inset 0 1px 1px rgba(255, 255, 255, .35);

            overflow: hidden;

            animation: dropdownBlur .35s ease;
        }

        .dropdown-item {

            display: flex;
            align-items: center;

            padding: 15px 22px;

            color: #333;

            font-family: "Source Serif 4", serif;

            font-size: 15px;

            font-weight: 500;

            line-height: 1.5;

            text-decoration: none;

            transition: all .25s ease;

            position: relative;

        }

        .dropdown-item:not(:last-child) {

            border-bottom: 1px solid rgba(255, 255, 255, .18);

        }

        .dropdown-item:hover {

            background: rgba(255, 255, 255, .55);

            color: #b40002;

            padding-left: 28px;

            backdrop-filter: blur(35px);

        }

        .dropdown-item::before {

            content: "";

            position: absolute;

            left: 0;

            top: 0;

            width: 4px;

            height: 100%;

            background: #b40002;

            transform: scaleY(0);

            transition: .25s ease;

        }

        .dropdown-item:hover::before {

            transform: scaleY(1);

        }

        /* Fade + Slide Animation */

        @keyframes dropdownBlur {

            from {

                opacity: 0;

                transform: translateY(12px) scale(.97);

                filter: blur(10px);

            }

            to {

                opacity: 1;

                transform: translateY(0) scale(1);

                filter: blur(0);

            }

        }

        /* Mobile submenu */

        #aboutMenu .mobile-link {

            padding-left: 3.5rem;

            font-family: "Source Serif 4", serif;

            font-size: 16px;

            font-weight: 500;

            background: rgba(255, 255, 255, .55);

        }

        #aboutMenu .mobile-link:hover {

            padding-left: 4rem;

        }
    </style> -->
